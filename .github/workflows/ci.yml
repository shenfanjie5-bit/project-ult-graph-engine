name: CI

# stage-2.10 plan canonical 5-lane CI (sibling of subsystem-news Stage
# 2.9 ci.yml, adapted for graph-engine's 2-step install — graph-engine
# does NOT depend on subsystem-sdk; it consumes Ex-3 from contracts
# directly, same pattern as entity-registry).
#
# Per stage-2 plan iron rule #6 the pinned tags MUST be release tags
# (no @main allowed):
#   - contracts @v0.1.3 (graph-engine's only cross-repo runtime dep)
#   - audit-eval @v0.2.2 ([shared-fixtures] extra; case_ex3_negative
#     baseline used by all consumers)
#
# Plan A 2-step preinstall on EVERY lane (NOT split into bootstrap-* +
# install-*) so the install order is enforced by lane shape:
#   1. pip install contracts@v0.1.3
#   2. pip install -e ".[<lane extras>]"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # full(ci) lane — all extras, full pytest collection (includes
  # tests/regression which hard-imports audit_eval_fixtures per iron
  # rule #1, and tests/contract which hard-imports contracts.schemas
  # per iron rule #4).
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Authenticate private git dependencies
        env:
          GH_TOKEN: ${{ secrets.PROJECT_ULT_CI_READ_TOKEN || github.token }}
        run: |
          auth_header="$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w 0)"
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic ${auth_header}"
      - name: Step 1 — Install contracts@v0.1.3
        run: pip install "git+https://github.com/shenfanjie5-bit/project-ult-contracts.git@v0.1.3"
      - name: Step 2 — Install (full(ci) lane — all extras)
        run: pip install -e ".[dev,contracts-schemas,shared-fixtures]"
      - name: Tests
        run: python -m pytest

  test-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Authenticate private git dependencies
        env:
          GH_TOKEN: ${{ secrets.PROJECT_ULT_CI_READ_TOKEN || github.token }}
        run: |
          auth_header="$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w 0)"
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic ${auth_header}"
      - name: Step 1 — Install contracts@v0.1.3
        run: pip install "git+https://github.com/shenfanjie5-bit/project-ult-contracts.git@v0.1.3"
      - name: Step 2 — Install (offline-first dev only)
        run: pip install -e ".[dev]"
      - name: test-fast (unit + boundary)
        run: python -m pytest tests/unit tests/boundary -q

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Authenticate private git dependencies
        env:
          GH_TOKEN: ${{ secrets.PROJECT_ULT_CI_READ_TOKEN || github.token }}
        run: |
          auth_header="$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w 0)"
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic ${auth_header}"
      - name: Step 1 — Install contracts@v0.1.3
        run: pip install "git+https://github.com/shenfanjie5-bit/project-ult-contracts.git@v0.1.3"
      - name: Step 2 — Install (offline-first dev only)
        run: pip install -e ".[dev]"
      - name: smoke
        run: python -m pytest tests/smoke -q

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Authenticate private git dependencies
        env:
          GH_TOKEN: ${{ secrets.PROJECT_ULT_CI_READ_TOKEN || github.token }}
        run: |
          auth_header="$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w 0)"
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic ${auth_header}"
      - name: Step 1 — Install contracts@v0.1.3
        run: pip install "git+https://github.com/shenfanjie5-bit/project-ult-contracts.git@v0.1.3"
      - name: Step 2 — Install (with cross-repo contracts-schemas extra)
        run: pip install -e ".[dev,contracts-schemas]"
      - name: contract (incl. cross-repo alignment)
        run: python -m pytest tests/contract -q

  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Authenticate private git dependencies
        env:
          GH_TOKEN: ${{ secrets.PROJECT_ULT_CI_READ_TOKEN || github.token }}
        run: |
          auth_header="$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w 0)"
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic ${auth_header}"
      - name: Step 1 — Install contracts@v0.1.3
        run: pip install "git+https://github.com/shenfanjie5-bit/project-ult-contracts.git@v0.1.3"
      - name: Step 2 — Install (with shared-fixtures git extra @v0.2.2)
        run: pip install -e ".[dev,shared-fixtures]"
      - name: regression (must really consume audit_eval_fixtures)
        run: python -m pytest tests/regression -q
